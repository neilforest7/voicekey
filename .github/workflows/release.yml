name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.resolve_tag.outputs.tag }}
      changelog: ${{ steps.resolve_notes.outputs.notes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm ci
          npx standard-version --release-as ${{ inputs.release_type }}
          git push --follow-tags origin HEAD:main

      - name: Resolve tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(git describe --tags --abbrev=0)
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG"

      - name: Extract changelog from repository
        if: github.event_name == 'workflow_dispatch'
        id: changelog_from_repo
        run: |
          CHANGELOG_CONTENT=$(node .github/scripts/extract-changelog.js)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract release notes from tag annotation
        if: github.event_name == 'push'
        id: changelog_from_tag
        run: |
          NOTES=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")
          if [ -z "$NOTES" ]; then
            NOTES="Automated build for ${GITHUB_REF_NAME}."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Resolve release notes
        id: resolve_notes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo '${{ steps.changelog_from_repo.outputs.notes }}' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo '${{ steps.changelog_from_tag.outputs.notes }}' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

  build-mac:
    needs: [prepare-release]
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
            args: --x64
          - os: macos-latest
            arch: arm64
            args: --arm64
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.new_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app (unsigned)
        run: |
          npm run build -- \
            --mac ${{ matrix.args }} \
            -c.mac.identity=null \
            -c.mac.hardenedRuntime=false \
            --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts-${{ matrix.arch }}
          path: release/**/Voice*-Mac-*.dmg
          if-no-files-found: error

  build-win:
    needs: [prepare-release]
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.new_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app (unsigned)
        run: npm run build -- --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-artifacts
          path: release/**/Voice*-Windows-*-Setup.exe
          if-no-files-found: error

  release:
    needs: [prepare-release, build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mac-artifacts-*
          merge-multiple: true
          path: artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-artifacts
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.new_tag }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/Voice*-Mac-*.dmg
            artifacts/**/Voice*-Windows-*-Setup.exe
          body: |
            ## 🎉 New Release

            **Unsigned builds may trigger platform security warnings during installation.**

            ### macOS
            If macOS blocks the app on first launch, run:

            ```bash
            xattr -cr /Applications/Voice\ Key.app
            ```

            ### Windows
            If SmartScreen appears:
            1. Click "More info"
            2. Click "Run anyway"

            ---

            ${{ needs.prepare-release.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-trigger-help:
    if: github.event_name == 'workflow_dispatch'
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Summarize release behavior
        run: |
          echo "Manual dispatch bumped version, pushed the tag, and published build artifacts."
          echo "Future pushes of v* tags will also trigger automatic packaging and release publishing." >> $GITHUB_STEP_SUMMARY

  tag-trigger-help:
    if: github.event_name == 'push'
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Summarize tag release behavior
        run: |
          echo "Tag push ${GITHUB_REF_NAME} triggered automatic packaging and GitHub Release publishing." >> $GITHUB_STEP_SUMMARY
          echo "Use an annotated v* tag if you want custom release notes from the tag body." >> $GITHUB_STEP_SUMMARY

